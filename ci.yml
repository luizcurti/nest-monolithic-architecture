name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    services:
      postgres:
        image: postgres:11.8
        env:
          POSTGRES_PASSWORD: qso_password
          POSTGRES_USER: qso_user
          POSTGRES_DB: qso_example
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    # TESTS
    - name: Run ESLint
      run: npm run lint

    - name: TypeScript Check
      run: npx tsc --noEmit

    - name: Run unit tests
      run: npm run test:ci

    - name: Run e2e tests
      run: npm run test:e2e
      env:
        DATABASE_DATASOURCE: typeorm
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        TYPEORM_HOST: localhost
        TYPEORM_PORT: 5432
        TYPEORM_USERNAME: qso_user
        TYPEORM_PASSWORD: qso_password
        TYPEORM_DATABASE: qso_example
        MONGODB_URL: mongodb://localhost:27017/test

    - name: Run test coverage (unit tests)
      run: npm run test:cov -- --passWithNoTests

    - name: Run e2e test coverage  
      run: npm run test:e2e:cov

    # SECURITY
    - name: Security audit - Overview
      run: |
        echo "Running security audit..."
        npm audit || echo "Security vulnerabilities found - review required but CI continues"
        echo "Audit completed. Check above for details."
      continue-on-error: true

    # DOCKER
    - name: Build application
      run: npm run build

    - name: Test Docker build
      run: docker build -t monolithic-architecture .

    - name: Test Docker Compose
      run: docker compose config